<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Background Remover</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: linear-gradient(#f0f4f8, #e0e7f0); padding: 20px; }
        .container { max-width: 720px; margin: auto; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { color: #1e3a8a; }

        button { padding: 15px 40px; font-size: 18px; background: #2563eb; color: white; border: none; border-radius: 10px; cursor: pointer; }
        button:hover { background: #1e40af; }
        img { max-width: 100%; margin: 20px 0; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 AI Background Remover</h1>
        <p>High Precision • Powered by remove.bg</p>
        
        <input type="file" id="upload" accept="image/*"><br><br>
        <button onclick="removeBackground()">✨ Remove Background</button>
        
        <div id="result" style="margin-top: 30px;"></div>
    </div>

    <script>
        async function removeBackground() {
            const file = document.getElementById('upload').files[0];
            if (!file) {
                alert("Please select an image first!");
                return;
            }

            const formData = new FormData();
            formData.append('image_file', file);
            formData.append('size', 'auto');

            document.getElementById('result').innerHTML = '<p>Processing with AI...</p>';

            try {
                const response = await fetch('https://api.remove.bg/v1.0/removebg', {
                    method: 'POST',
                    headers: {
                        'X-Api-Key': '7KMKZrtiMwQN9hHjpytSQckz'
                    },
                    body: formData
                });

                if (response.ok) {
                    const blob = await response.blob();
                    const url = URL.createObjectURL(blob);
                    document.getElementById('result').innerHTML = `
                        <h2>✅ Result Ready</h2>
                        <img src="${url}" alt="Removed Background">
                        <br><br>
                        <a href="${url}" download="removed_bg.png" style="padding:12px 30px; background:#10b981; color:white; text-decoration:none; border-radius:8px;">⬇️ Download PNG</a>
                    `;
                } else {
                    alert("Error: " + response.statusText);
                }
            } catch (e) {
                alert("Failed to connect. Check internet.");
            }
        }
    </script>
</body>
</html>
